<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Verify certificates issued by IKIGAI 2026"
    >

    <title>
        Verify Certificate | IKIGAI 2026
    </title>


    <!-- APPLY SAVED THEME BEFORE PAGE LOAD -->

    <script>

        (function () {

            const savedTheme =
                localStorage.getItem("ikigai-theme");

            const prefersLight =
                window.matchMedia(
                    "(prefers-color-scheme: light)"
                ).matches;

            const theme =
                savedTheme ||
                (prefersLight ? "light" : "dark");

            document.documentElement.setAttribute(
                "data-theme",
                theme
            );

        })();

    </script>


    <!-- GOOGLE FONTS -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet"
    >


    <!-- MAIN STYLESHEET -->

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <!-- =====================================
         BACKGROUND EFFECTS
    ====================================== -->

    <div
        class="background-effects"
        aria-hidden="true"
    >

        <div class="orb orb-one"></div>

        <div class="orb orb-two"></div>

        <div class="orb orb-three"></div>

        <div class="grid-overlay"></div>

    </div>



    <!-- =====================================
         NAVIGATION
    ====================================== -->

    <nav class="navbar">


        <!-- BRAND -->

        <a
            href="index.html"
            class="brand"
            aria-label="IKIGAI 2026 Home"
        >


            <div class="brand-icon">

                I

            </div>


            <div class="brand-information">


                <span class="brand-name">

                    IKIGAI

                </span>


                <span class="brand-year">

                    2026

                </span>


            </div>


        </a>



        <!-- NAVIGATION ACTIONS -->

        <div class="nav-actions">


            <!-- SYSTEM STATUS -->

            <div class="nav-status">


                <span class="status-dot"></span>


                <span>

                    Official Verification Portal

                </span>


            </div>



            <!-- THEME TOGGLE -->

            <button
                id="themeToggle"
                class="theme-toggle"
                type="button"
                aria-label="Change website theme"
            >

                <!-- Added automatically by theme.js -->

            </button>


        </div>


    </nav>



    <!-- =====================================
         VERIFICATION PAGE
    ====================================== -->

    <main class="verify-page">


        <section class="verify-container">



            <!-- =================================
                 LOADING STATE
            ================================== -->

            <div
                id="loadingState"
                class="result-card loading-card"
            >


                <!-- LOADING ICON -->

                <div class="loading-animation">


                    <div class="loader-ring"></div>


                    <div class="loader-center">

                        I

                    </div>


                </div>



                <!-- LOADING HEADING -->

                <h1>

                    Verifying Certificate

                </h1>



                <!-- LOADING DESCRIPTION -->

                <p>

                    Checking the certificate against
                    the official IKIGAI 2026
                    certificate database.

                </p>



                <!-- LOADING PROGRESS BAR -->

                <div class="loading-line">


                    <div class="loading-progress"></div>


                </div>


            </div>



            <!-- =================================
                 RESULT CONTAINER
            ================================== -->

            <div
                id="result"
                aria-live="polite"
            >

                <!--
                    Certificate verification result
                    is generated by verify.js
                -->

            </div>


        </section>


    </main>



    <!-- =====================================
         FOOTER
    ====================================== -->

    <footer>


        <!-- COPYRIGHT -->

        <div class="footer-copyright">

            © 2026 IKIGAI Hackathon

        </div>



        <!-- SYSTEM STATUS -->

        <div class="footer-status">


            <span class="status-dot"></span>


            <span>

                Verification System Online

            </span>


        </div>


    </footer>



    <!-- =====================================
         THEME SYSTEM
    ====================================== -->

    <script src="theme.js"></script>



    <!-- =====================================
         CERTIFICATE VERIFICATION
    ====================================== -->

    <script src="verify.js"></script>


</body>

</html>
